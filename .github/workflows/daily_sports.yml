name: Daily — daily_sports_kr (K-스포츠)

# 사용 전 사전 준비 (CLAUDE.md '두 번째 토픽 채널 추가' 섹션 참고):
#   1. IG 비즈니스 계정 'daily_sports_kr' 생성 + FB 페이지 연결
#   2. Meta dev 앱에서 daily_sports_kr 을 Instagram 테스터로 등록
#   3. 토큰 발급 → exchange_token.py로 장기화 후
#   4. 아래 secrets 추가:
#      INSTAGRAM_USER_ID_SPORTS, INSTAGRAM_ACCESS_TOKEN_SPORTS,
#      INSTAGRAM_APP_SECRET_SPORTS (또는 기존 _ 재사용)

on:
  # 시크릿(INSTAGRAM_USER_ID_SPORTS 등) 세팅 후 schedule 줄 주석 해제하세요.
  # schedule:
  #   - cron: '0 0 * * *'   # 한국시간 09:00 (daily_enter와 1시간 간격)
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CHANNEL: daily_sports_kr

jobs:
  post-news:
    runs-on: ubuntu-latest
    timeout-minutes: 110  # jitter 최대 90분 + 파이프라인 처리 여유

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Korean fonts (Pretendard + Noto fallback) + ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk ffmpeg unzip
          mkdir -p /tmp/pretendard
          curl -fsSL -o /tmp/pretendard.zip \
            https://github.com/orioncactus/pretendard/releases/download/v1.3.9/Pretendard-1.3.9.zip
          unzip -q -o /tmp/pretendard.zip -d /tmp/pretendard
          sudo mkdir -p /usr/share/fonts/opentype/pretendard
          sudo cp /tmp/pretendard/public/static/Pretendard-{Bold,SemiBold,Medium,Regular}.otf \
            /usr/share/fonts/opentype/pretendard/
          sudo fc-cache -f /usr/share/fonts/opentype/pretendard/

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news posting pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID_SPORTS }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN_SPORTS }}
          INSTAGRAM_APP_SECRET: ${{ secrets.INSTAGRAM_APP_SECRET_SPORTS || secrets.INSTAGRAM_APP_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python main.py

      - name: Fetch insights snapshot
        if: success()
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID_SPORTS }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN_SPORTS }}
          INSIGHTS_PATH: insights_sports.json
        run: python fetch_insights.py
        continue-on-error: true

      - name: Commit state + insights
        if: always()
        run: |
          changes=""
          if [ -f state_sports.json ] && ! git diff --quiet state_sports.json 2>/dev/null; then changes="$changes state_sports.json"; fi
          if [ -f insights_sports.json ] && ! git diff --quiet insights_sports.json 2>/dev/null; then changes="$changes insights_sports.json"; fi
          if [ -z "$changes" ]; then
            echo "No changes — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $changes
          git commit -m "state(sports): $(date -u '+%Y-%m-%d %H:%M UTC') run [skip ci]"
          git pull --rebase --autostash origin main || true
          git push

      - name: Upload generated images as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cards-sports-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(cat <<EOF
          {"content": "🚨 **daily_sports_kr 워크플로우 실패**\n\n실행 ID: \`${{ github.run_id }}\`\n로그: $RUN_URL"}
          EOF
          )
          curl -fsS -X POST -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL" || echo "webhook send failed"
