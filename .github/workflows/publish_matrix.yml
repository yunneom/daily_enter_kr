name: Publish matrix to IG

# 매트릭스 + 스피너 시리즈를 IG @daily_enter_kr 에 Reels 로 게시.
# 하루 4회 자동 게시 — 처음 3슬롯은 매트릭스 (시간대 회전), 마지막 슬롯은 스피너 전용.

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = KST 09:00 — 매트릭스
    - cron: '0 4 * * *'   # UTC 04:00 = KST 13:00 — 매트릭스
    - cron: '0 9 * * *'   # UTC 09:00 = KST 18:00 — 매트릭스
    - cron: '0 12 * * *'  # UTC 12:00 = KST 21:00 — 스피너 (전용)
  workflow_dispatch:
    inputs:
      topic:
        description: '토픽 ID (powerpick_office / girlgroup_4gen_tier1_10k / girlgroup_4gen_tier2_10k / girlgroup_4gen_tier3_10k / girlgroup_5gen_tier1_10k / girlgroup_5gen_tier2_10k / boygroup_4gen_tier1_10k / boygroup_4gen_tier2_10k / boygroup_5gen_tier1_10k / child_pick_100man / trot_concert_10k / ballad_concert_10k / travel_30man / weekend_5man / lunch_15k / idol_allstar_10k / girlgroup_real_10k / girlgroup_4gen_10k / boygroup_4gen_10k / idealtype_10k / spinner_food_man / spinner_lazy_woman / spinner_idol_pick / auto / auto_matrix / auto_spinner / all)'
        required: false
        default: 'all'
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install fonts + Pretendard + ffmpeg
        run: |
          sudo apt-get update
          # ffmpeg = 매트릭스 jpg → Reels mp4 변환에 필수
          sudo apt-get install -y fonts-noto-cjk unzip ffmpeg
          mkdir -p /tmp/pretendard
          curl -fsSL -o /tmp/pretendard.zip \
            https://github.com/orioncactus/pretendard/releases/download/v1.3.9/Pretendard-1.3.9.zip
          unzip -q -o /tmp/pretendard.zip -d /tmp/pretendard
          sudo mkdir -p /usr/share/fonts/opentype/pretendard
          sudo cp /tmp/pretendard/public/static/Pretendard-{Bold,SemiBold,Medium,Regular}.otf \
            /usr/share/fonts/opentype/pretendard/
          sudo fc-cache -f /usr/share/fonts/opentype/pretendard/

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build + upload + publish
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # 수동 dispatch 면 입력값, 스케줄이면 'auto' (요일 회전)
          # 수동 dispatch 우선. cron 호출 시 21:00 KST(UTC 12:00) 슬롯은 스피너 전용,
          # 나머지 cron 슬롯은 매트릭스 회전.
          TOPIC: ${{ inputs.topic || (github.event.schedule == '0 12 * * *' && 'auto_spinner' || 'auto_matrix') }}
        run: python scripts/publish_matrix.py

      - name: Upload generated images (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-images-${{ github.run_number }}
          path: output_enter/publish/
          retention-days: 7
          if-no-files-found: ignore
