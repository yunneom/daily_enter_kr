name: Publish matrix to IG

# 매트릭스 + 스피너 시리즈를 IG @daily_enter_kr 에 Reels 로 게시.
# 하루 4회 자동 게시 — 처음 3슬롯은 매트릭스 (시간대 회전), 마지막 슬롯은 스피너 전용.

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = KST 09:00 — 매트릭스
    - cron: '0 4 * * *'   # UTC 04:00 = KST 13:00 — 매트릭스
    - cron: '0 9 * * *'   # UTC 09:00 = KST 18:00 — 매트릭스
    - cron: '0 12 * * 1,3,5'  # UTC 12:00 = KST 21:00 — 스피너 (월·수·금 주3회; 정적자산 3종 과다게시 방지)
  workflow_dispatch:
    inputs:
      topic:
        description: '토픽 ID (soccer_nationalteam_1000eok / job_pick_10k / power_budget_10k / powerpick_office / powerpick_student / powerpick_teacher / powerpick_neet / powerpick_landlord / powerpick_idol / girlgroup_4gen_tier1_10k / girlgroup_4gen_tier2_10k / girlgroup_4gen_tier3_10k / girlgroup_5gen_tier1_10k / boygroup_4gen_tier1_10k / boygroup_4gen_tier2_10k / boygroup_5gen_tier1_10k / child_pick_100man / spot_diff_bear / trot_concert_10k / ballad_concert_10k / travel_30man / weekend_5man / lunch_15k / idol_allstar_10k / girlgroup_real_10k / girlgroup_4gen_10k / boygroup_4gen_10k / idealtype_10k / spinner_food_man / spinner_lazy_woman / spinner_idol_pick / auto / auto_matrix / auto_spinner / all)'
        required: false
        default: 'all'
        type: string

permissions:
  contents: write   # docs/index.html 자동 커밋 (쿠팡 랜딩 페이지)

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install fonts + Pretendard + ffmpeg
        run: |
          sudo apt-get update
          # ffmpeg = 매트릭스 jpg → Reels mp4 변환에 필수
          sudo apt-get install -y fonts-noto-cjk unzip ffmpeg
          mkdir -p /tmp/pretendard
          curl -fsSL -o /tmp/pretendard.zip \
            https://github.com/orioncactus/pretendard/releases/download/v1.3.9/Pretendard-1.3.9.zip
          unzip -q -o /tmp/pretendard.zip -d /tmp/pretendard
          sudo mkdir -p /usr/share/fonts/opentype/pretendard
          sudo cp /tmp/pretendard/public/static/Pretendard-{Bold,SemiBold,Medium,Regular}.otf \
            /usr/share/fonts/opentype/pretendard/
          sudo fc-cache -f /usr/share/fonts/opentype/pretendard/

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build + upload + publish
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # 쿠팡 파트너스 — 수익은 data/coupang_shortlinks.csv 의 단축링크가 결정.
          # AF_ID 단독은 검색 URL fallback 에 사용했었지만 실제 수익 인정 X → 제거.
          # 멀티플랫폼 신디케이션 — 미설정 시 자동 skip (IG 게시는 정상 진행)
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          # abc 송(@sunnyandgigi) 음악 크레딧 — 캡션/댓글/YT설명에 풀버전 링크.
          # MUSIC_YT_URL 미설정 시 전체 silent skip (기존 동작 유지).
          MUSIC_YT_URL: ${{ secrets.MUSIC_YT_URL }}
          MUSIC_TITLE: ${{ secrets.MUSIC_TITLE }}
          MUSIC_HANDLE: ${{ secrets.MUSIC_HANDLE }}
          # 수동 dispatch 면 입력값, 스케줄이면 'auto' (요일 회전)
          # 수동 dispatch 우선. cron 호출 시 21:00 KST(UTC 12:00) 슬롯은 스피너 전용,
          # 나머지 cron 슬롯은 매트릭스 회전.
          TOPIC: ${{ inputs.topic || (github.event.schedule == '0 12 * * *' && 'auto_spinner' || 'auto_matrix') }}
        run: python scripts/publish_matrix.py

      - name: Fetch IG insights (게시별 + 계정 단위 abc송 퍼널)
        if: success()
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: python fetch_insights.py
        continue-on-error: true  # 인사이트 실패해도 게시 자체는 성공 처리

      - name: Cross-platform 통합 분석 (IG↔YT 조인 + abc송 퍼널 + BGM A/B)
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python cross_platform_report.py
        continue-on-error: true

      - name: Commit landing + ledger + insights + cross-platform report
        if: always()
        run: |
          changes=""
          if [ -n "$(git status --porcelain docs/ 2>/dev/null)" ]; then changes="$changes docs/"; fi
          if [ -f post_ledger.json ] && [ -n "$(git status --porcelain post_ledger.json 2>/dev/null)" ]; then changes="$changes post_ledger.json"; fi
          if [ -f insights.json ] && [ -n "$(git status --porcelain insights.json 2>/dev/null)" ]; then changes="$changes insights.json"; fi
          if [ -z "$changes" ]; then
            echo "변경 없음 — 커밋 스킵"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $changes
          git commit -m "matrix state: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          BRANCH="${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "$BRANCH" || true
          git push origin "HEAD:$BRANCH"

      - name: Upload generated images (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-images-${{ github.run_number }}
          path: output_enter/publish/
          retention-days: 7
          if-no-files-found: ignore
