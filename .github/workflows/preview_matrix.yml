name: Preview — photo matrix sample

# 1회성 미리보기. Unsplash 사진 매트릭스 빌드 → Cloudinary 업로드 → Discord URL 알림.
# workflow_dispatch 전용. 매트릭스 모듈은 dispatch 시 선택한 ref(브랜치)에서 가져옴.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install fonts + Pretendard
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk unzip
          mkdir -p /tmp/pretendard
          curl -fsSL -o /tmp/pretendard.zip \
            https://github.com/orioncactus/pretendard/releases/download/v1.3.9/Pretendard-1.3.9.zip
          unzip -q -o /tmp/pretendard.zip -d /tmp/pretendard
          sudo mkdir -p /usr/share/fonts/opentype/pretendard
          sudo cp /tmp/pretendard/public/static/Pretendard-{Bold,SemiBold,Medium,Regular}.otf \
            /usr/share/fonts/opentype/pretendard/
          sudo fc-cache -f /usr/share/fonts/opentype/pretendard/

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build + upload preview
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/preview_photo_matrix.py

      - name: Upload built image artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: photo-matrix-preview-${{ github.run_number }}
          path: output_enter/preview/
          retention-days: 7
          if-no-files-found: ignore
