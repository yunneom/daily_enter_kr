name: 🏆 걸그룹 월드컵 캠페인

# 6/23 ~ 7/5 동안 매 30분 cron 트리거 → orchestrator 가 일정 슬롯 매칭 시만 실행.
# 캠페인 시간 외엔 silent skip. manual dispatch 로 라운드 강제 실행 가능.

on:
  schedule:
    - cron: '*/30 * 23-30 6 *'   # 6월 23~30일 매 30분
    - cron: '*/30 * 1-6 7 *'     # 7월 1~6일 매 30분 (연장 — 결승 7/5)
  workflow_dispatch:
    inputs:
      action:
        description: 'publish | tally | announce | bracket | render_test'
        required: false
        default: ''
      round:
        description: 'R32 | R16 | R8 | R4 | R2 | R1'
        required: false
        default: ''

permissions:
  contents: write

# 게시 진행 중(15-20분) 다음 cron 이 겹치면 중복 게시 위험 → 직렬화.
# 큐잉된 두 번째 run 은 already_done 으로 silent skip.
concurrency:
  group: worldcup-campaign
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install fonts (Pretendard) + ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk unzip ffmpeg
          mkdir -p /tmp/pretendard
          curl -fsSL -o /tmp/pretendard.zip \
            https://github.com/orioncactus/pretendard/releases/download/v1.3.9/Pretendard-1.3.9.zip
          unzip -q -o /tmp/pretendard.zip -d /tmp/pretendard
          sudo mkdir -p /usr/share/fonts/opentype/pretendard
          sudo cp /tmp/pretendard/public/static/Pretendard-{Bold,SemiBold,Medium,Regular}.otf \
            /usr/share/fonts/opentype/pretendard/
          sudo fc-cache -f /usr/share/fonts/opentype/pretendard/

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Orchestrator
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MUSIC_YT_URL: ${{ secrets.MUSIC_YT_URL }}
          MUSIC_TITLE: ${{ secrets.MUSIC_TITLE }}
          MUSIC_HANDLE: ${{ secrets.MUSIC_HANDLE }}
          WORLDCUP_ACTION: ${{ inputs.action }}
          WORLDCUP_ROUND: ${{ inputs.round }}
        run: python scripts/worldcup_orchestrator.py

      - name: Commit bracket + ledger + outputs
        if: always()
        run: |
          changes=""
          if [ -n "$(git status --porcelain data/worldcup_bracket.json 2>/dev/null)" ]; then changes="$changes data/worldcup_bracket.json"; fi
          if [ -n "$(git status --porcelain post_ledger.json 2>/dev/null)" ]; then changes="$changes post_ledger.json"; fi
          if [ -d docs/worldcup_preview ] && [ -n "$(git status --porcelain docs/worldcup_preview 2>/dev/null)" ]; then changes="$changes docs/worldcup_preview"; fi
          if [ -z "$changes" ]; then
            echo "변경 없음 — 커밋 스킵"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $changes
          git commit -m "worldcup: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          BRANCH="${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "$BRANCH" || true
          git push origin "HEAD:$BRANCH"

      - name: Upload generated assets (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worldcup-${{ github.run_number }}
          # 라운드별 출력(worldcup_r32/r16/.../bracket/announce) +
          # render_test 의 worldcup_r16_preview/ + idol_photos/ 캐시까지 포함.
          path: |
            output_enter/publish/worldcup_*/
            output_enter/worldcup_*/
            output_enter/idol_photos/
          retention-days: 14
          if-no-files-found: ignore
