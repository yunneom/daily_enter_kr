name: 🏆 걸그룹 월드컵 캠페인

# 6/23 ~ 7/5 동안 매 30분 cron 트리거 → orchestrator 가 일정 슬롯 매칭 시만 실행.
# 캠페인 시간 외엔 silent skip. manual dispatch 로 라운드 강제 실행 가능.

on:
  push:
    branches: [main]
    # push 트리거: cron 드롭 시 수동 커밋으로 즉시 실행 가능.
    # orchestrator 가 SCHEDULE 슬롯 매칭 + already_done 으로 중복 방지.
  schedule:
    # 15분 간격 — GitHub 스케줄러가 피크시간대 cron 을 자주 드롭/지연시켜서
    # (실측: 12:00 KST 슬롯 미발화) 빈도 ↑ 로 발화 기회 확보. TOLERANCE 60분과 결합.
    # 시즌2: 7/14 08:00 KST(=7/13 23:00 UTC) 32강 ~ 8/1 우승발표. UTC 기준이라 7/13부터.
    - cron: '*/15 * 13-31 7 *'   # 7/13 ~ 7/31 매 15분
    - cron: '*/15 * 1 8 *'       # 8/1 (우승 발표 8/1 09:30 KST = 00:30 UTC)
  workflow_dispatch:
    inputs:
      action:
        description: 'publish | tally | announce | bracket | promo_blast | render_test | photo_test'
        required: false
        default: ''
      round:
        description: 'R32 | R16 | R8 | R4 | R2 | R1'
        required: false
        default: ''

permissions:
  contents: write

# 게시 진행 중(15-20분) 다음 cron 이 겹치면 중복 게시 위험 → 직렬화.
# 큐잉된 두 번째 run 은 already_done 으로 silent skip.
concurrency:
  group: worldcup-campaign
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install fonts (Pretendard) + ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk unzip ffmpeg
          mkdir -p /tmp/pretendard
          curl -fsSL -o /tmp/pretendard.zip \
            https://github.com/orioncactus/pretendard/releases/download/v1.3.9/Pretendard-1.3.9.zip
          unzip -q -o /tmp/pretendard.zip -d /tmp/pretendard
          sudo mkdir -p /usr/share/fonts/opentype/pretendard
          sudo cp /tmp/pretendard/public/static/Pretendard-{Bold,SemiBold,Medium,Regular}.otf \
            /usr/share/fonts/opentype/pretendard/
          sudo fc-cache -f /usr/share/fonts/opentype/pretendard/

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Orchestrator
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          # 실사 사진 on — data/idol_photo_overrides.json 의 검증된 커먼즈 파일만
          # (27/32 커버). CC/PD 라이선스 게이트 + 성인(만 18세) 게이트 통과분만 카드에 합성.
          # 크레딧은 카드 하단 + 캡션 양쪽 자동 표기.
          # ⚠️ 신고/strike 대응 롤백 = 이 값을 "off" 로 (1줄 롤백, 이모지 폴백 복귀).
          IDOL_PHOTOS: "on"
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MUSIC_YT_URL: ${{ secrets.MUSIC_YT_URL }}
          MUSIC_TITLE: ${{ secrets.MUSIC_TITLE }}
          MUSIC_HANDLE: ${{ secrets.MUSIC_HANDLE }}
          WORLDCUP_ACTION: ${{ inputs.action }}
          WORLDCUP_ROUND: ${{ inputs.round }}
        run: python scripts/worldcup_orchestrator.py

      - name: Commit bracket + ledger + outputs
        if: always()
        run: |
          changes=""
          if [ -n "$(git status --porcelain data/worldcup_bracket.json 2>/dev/null)" ]; then changes="$changes data/worldcup_bracket.json"; fi
          if [ -n "$(git status --porcelain post_ledger.json 2>/dev/null)" ]; then changes="$changes post_ledger.json"; fi
          if [ -d docs/worldcup_preview ] && [ -n "$(git status --porcelain docs/worldcup_preview 2>/dev/null)" ]; then changes="$changes docs/worldcup_preview"; fi
          if [ -z "$changes" ]; then
            echo "변경 없음 — 커밋 스킵"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $changes
          git commit -m "worldcup: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          BRANCH="${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "$BRANCH" || true
          git push origin "HEAD:$BRANCH"

      - name: Upload generated assets (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worldcup-${{ github.run_number }}
          # 라운드별 출력(worldcup_r32/r16/.../bracket/announce) +
          # render_test 의 worldcup_r16_preview/ + idol_photos/ 캐시까지 포함.
          path: |
            output_enter/publish/worldcup_*/
            output_enter/worldcup_*/
            output_enter/idol_photos/
          retention-days: 14
          if-no-files-found: ignore
