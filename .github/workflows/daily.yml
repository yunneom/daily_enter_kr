name: Daily — daily_enter_kr (K-연예)

on:
  schedule:
    # 한국시간 오전 8시 (UTC 23:00). main.py가 0-90분 랜덤 jitter 적용.
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write  # state.json + insights.json commit-back

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CHANNEL: daily_enter_kr

jobs:
  post-news:
    runs-on: ubuntu-latest
    timeout-minutes: 110  # jitter 최대 90분 + 파이프라인 처리 여유

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Korean fonts + ffmpeg
        run: |
          sudo apt-get update
          # ffmpeg 는 ubuntu-latest 에 기본 설치돼 있지만 명시적으로 보장 (Reels mp4 빌드용)
          sudo apt-get install -y fonts-noto-cjk ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news posting pipeline
        id: post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_APP_SECRET: ${{ secrets.INSTAGRAM_APP_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python main.py

      - name: Fetch insights snapshot (likes/comments on recent posts)
        if: success()
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: python fetch_insights.py
        continue-on-error: true  # 인사이트 실패해도 메인 워크플로우는 성공으로 처리

      - name: Commit state.json + insights.json
        if: always()
        run: |
          changes=""
          if ! git diff --quiet state.json 2>/dev/null; then changes="$changes state.json"; fi
          if [ -f insights.json ] && ! git diff --quiet insights.json 2>/dev/null; then changes="$changes insights.json"; fi
          if [ -z "$changes" ]; then
            echo "No state/insights changes — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $changes
          git commit -m "state: $(date -u '+%Y-%m-%d %H:%M UTC') run [skip ci]"
          # rebase-on-push to handle concurrent commits gracefully
          git pull --rebase --autostash origin main || true
          git push

      - name: Upload generated images as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cards-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore

      - name: Notify on failure (Discord webhook, optional)
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(cat <<EOF
          {
            "content": "🚨 **daily_enter_kr 워크플로우 실패**\n\n실행 ID: \`${{ github.run_id }}\`\n워크플로우 로그: $RUN_URL\n\n로그 확인 후 조치 필요."
          }
          EOF
          )
          curl -fsS -X POST -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL" || echo "webhook send failed"
