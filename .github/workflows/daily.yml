name: Daily Instagram News Posting

on:
  schedule:
    # 매일 한국시간 오전 8시 (UTC 23:00) 실행. 봇 패턴 회피용 jitter는 main.py가 적용 (0-30분 랜덤 지연).
    - cron: '0 23 * * *'
  workflow_dispatch:  # 수동 실행도 가능

permissions:
  contents: write  # state.json 커밋용

jobs:
  post-news:
    runs-on: ubuntu-latest
    timeout-minutes: 50  # jitter(최대 30분) + 실행(최대 5분) + 여유

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news posting pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_APP_SECRET: ${{ secrets.INSTAGRAM_APP_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
        run: python main.py

      - name: Commit updated state.json
        if: always()  # 실패해도 state는 기록되도록
        run: |
          if git diff --quiet state.json 2>/dev/null; then
            echo "state.json unchanged — skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "state: $(date -u '+%Y-%m-%d %H:%M UTC') run [skip ci]"
            git push
          fi

      - name: Upload generated images as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cards-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
